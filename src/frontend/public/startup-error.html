<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pixiv Platform Startup Error</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #f7f4ef;
        color: #1d252c;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(620px, calc(100vw - 48px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 16px;
        color: #49545f;
        line-height: 1.55;
      }

      dl {
        display: grid;
        gap: 10px;
        margin: 22px 0 0;
      }

      dt {
        font-size: 12px;
        font-weight: 700;
        color: #6d747b;
        text-transform: uppercase;
      }

      dd {
        margin: 0;
        padding: 12px;
        overflow-wrap: anywhere;
        border: 1px solid #d7d0c4;
        border-radius: 8px;
        background: #fffdfa;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #191b1f;
          color: #f4f1ea;
        }

        p {
          color: #b8bdc2;
        }

        dt {
          color: #9fa6ad;
        }

        dd {
          border-color: #3b4147;
          background: #22262b;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Pixiv Platform could not start</h1>
      <p>The local desktop backend did not become ready. The details below can help diagnose the startup failure.</p>
      <dl>
        <dt>Error</dt>
        <dd id="startup-error-message">Unknown startup error.</dd>
        <dt>Log file</dt>
        <dd id="startup-error-log">Unavailable.</dd>
      </dl>
    </main>
    <script>
      const details = window.__PIXIV_PLATFORM_STARTUP_ERROR__ || {};
      document.getElementById("startup-error-message").textContent =
        details.message || "Unknown startup error.";
      document.getElementById("startup-error-log").textContent = details.logPath || "Unavailable.";
    </script>
  </body>
</html>
